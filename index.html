<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <!-- 1. Cette ligne force GitHub à s'ouvrir en mode mobile sur l'iPad -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
  <title>Mon Application</title>
  
  <style>
    /* 2. Ce CSS supprime les marges et force l'iFrame à faire la taille exacte de l'écran */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #ffffff;
    }
    
    .app-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      /* Force le défilement fluide spécifique à iOS/iPadOS */
      -webkit-overflow-scrolling: touch; 
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <!-- 3. Remplacez cette URL par votre lien /exec de Google Apps Script -->
    <iframe src="https://script.google.com/macros/s/AKfycbx6snUZqwul1fUv2R4ioRZJ45jrAKkevyf3MlV9MlvZXd2a924rCtZrl_esyoQwW2Pu/exec"></iframe>
  </div>

</body>
</html>
